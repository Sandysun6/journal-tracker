  "cities",
  "urbanization",
  "spatial",
  "geography",
  "agglomeration",
  "cluster",
  "local labor market",
  "neighborhood",
  "place-based",
]
must_all = []
exclude = ["book review", "editorial", "frontmatter", "backmatter"]
journal_allowlist = []

[topics.urban_and_spatial.priority_score]
urban = 2
city = 2
cities = 2
urbanization = 3
agglomeration = 3
spatial = 2

[topics.china_related]
label = "中国相关"
must_any = [
  "china",
  "chinese",
  "china trade",
  "china shock",
  "hukou",
  "local government",
  "state-owned",
]
must_all = []
exclude = ["book review", "editorial", "frontmatter", "backmatter"]
journal_allowlist = []

[topics.china_related.priority_score]
china = 2
chinese = 2
"china shock" = 3
hukou = 3
"state-owned" = 2

[routing]
zotero_collection_path = "00_Inbox_RSS/00_Read Soon"
add_tags = ["from-journal-tracker", "auto-screened"]
add_week_tag = true
skip_if_no_topic_match = true
allow_metadata_only_when_pdf_missing = true
