version = 1

[global]
case_sensitive = false
search_fields = ["title", "abstract"]
dedupe_by = ["doi", "url", "normalized_title"]

[topics.innovation_and_knowledge]
label = "创新与知识扩散"
must_any = [
  "innovation",
  "innovative",
  "knowledge spillover",
  "knowledge diffusion",
  "technology diffusion",
  "technology adoption",
  "patent",
  "patents",
  "inventor",
  "inventors",
  "r&d",
  "research and development",
  "technology",
  "technological change",
]
must_all = []
exclude = ["book review", "editorial", "frontmatter", "backmatter"]
journal_allowlist = []

[topics.innovation_and_knowledge.priority_score]
innovation = 3
"knowledge spillover" = 4
"knowledge diffusion" = 3
"technology diffusion" = 3
"technology adoption" = 2
patent = 2
"r&d" = 2

[topics.spillover_and_productivity]
label = "溢出与生产率"
must_any = [
  "spillover",
  "spillovers",
  "productivity",
  "tfp",
  "agglomeration",
  "cluster",
  "clusters",
  "knowledge diffusion",
  "learning by exporting",
  "technology transfer",
]
must_all = []
exclude = ["book review", "editorial", "frontmatter", "backmatter"]
journal_allowlist = []

[topics.spillover_and_productivity.priority_score]
spillover = 3
productivity = 2
agglomeration = 2
"technology transfer" = 2
"learning by exporting" = 3

[topics.trade_and_globalization]
label = "国际贸易与全球化"
must_any = [
  "trade",
  "international trade",
  "export",
  "exports",
  "import",
  "imports",
  "tariff",
  "tariffs",
  "globalization",
  "global value chain",
  "value chain",
  "supply chain",
  "offshoring",
  "multinational",
  "fdi",
  "foreign direct investment",
  "comparative advantage",
]
must_all = []
exclude = ["book review", "editorial", "frontmatter", "backmatter"]
journal_allowlist = []

[topics.trade_and_globalization.priority_score]
trade = 2
export = 2
imports = 2
tariff = 3
"global value chain" = 3
offshoring = 2
fdi = 2

[topics.urban_and_spatial]
